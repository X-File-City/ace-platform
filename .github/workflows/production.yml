name: Deploy to Production

on:
  # Manual trigger only - production deploys should be intentional
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        type: string

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Confirm deployment
        if: ${{ github.event.inputs.confirm != 'deploy' }}
        run: |
          echo "Deployment not confirmed. Please type 'deploy' to confirm."
          exit 1

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: validate

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ace_test
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/ace_test
          TEST_DATABASE_URL_ASYNC: postgresql+asyncpg://test:test@localhost:5432/ace_test
          TEST_DATABASE_URL_SYNC: postgresql://test:test@localhost:5432/ace_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key
          OPENAI_API_KEY: sk-test-fake-key
        run: |
          pytest tests/ -v --ignore=tests/test_e2e_billing_flow.py -q

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Run tests
        working-directory: web
        run: npx vitest run

      - name: Build
        working-directory: web
        env:
          VITE_API_URL: https://aceagent.io
        run: npm run build

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    environment: production  # Requires environment approval if configured

    steps:
      - uses: actions/checkout@v4

      - name: Set up Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Backend to Production
        run: flyctl deploy --remote-only --wait-timeout 15m --release-command-timeout 20m

      - name: Deploy Frontend to Production
        working-directory: web
        run: flyctl deploy --remote-only --wait-timeout 10m

      - name: Verify Backend Deployment
        run: |
          sleep 15
          curl -f https://aceagent.io/health || exit 1

      - name: Verify Frontend Deployment
        run: |
          curl -f https://app.aceagent.io/ || exit 1

      - name: Deployment Summary
        run: |
          echo "## Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend URL:** https://aceagent.io" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend URL:** https://app.aceagent.io" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
