name: Deploy to Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ace_test
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/ace_test
          TEST_DATABASE_URL_ASYNC: postgresql+asyncpg://test:test@localhost:5432/ace_test
          TEST_DATABASE_URL_SYNC: postgresql://test:test@localhost:5432/ace_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key
          OPENAI_API_KEY: sk-test-fake-key
        run: |
          pytest tests/ -v --ignore=tests/test_e2e_billing_flow.py -q

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Run tests
        working-directory: web
        run: npx vitest run

      - name: Build
        working-directory: web
        env:
          VITE_API_URL: https://ace-platform-staging.fly.dev
        run: npm run build

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Backend to Staging
        run: |
          set -euo pipefail

          cleanup_stale_release_machines() {
            local stale_ids
            stale_ids="$(flyctl machine list -a ace-platform-staging --json | jq -r '.[] | select(.config.metadata.fly_process_group == "fly_app_release_command") | select(.state == "created" or .state == "pending" or .state == "starting" or .state == "stopped" or .state == "suspended" or .state == "replacing") | .id')"

            if [[ -z "${stale_ids}" ]]; then
              echo "No stale release command machines detected."
              return 0
            fi

            echo "Cleaning up stale release command machines:"
            while IFS= read -r machine_id; do
              [[ -z "${machine_id}" ]] && continue
              echo " - Destroying ${machine_id}"
              flyctl machine destroy "${machine_id}" -a ace-platform-staging --force || true
            done <<< "${stale_ids}"
          }

          deploy_backend() {
            local depot_flag="$1"
            flyctl deploy \
              --config fly.staging.toml \
              --remote-only \
              --wait-timeout 15m \
              --depot="${depot_flag}"
          }

          for attempt in 1 2 3; do
            echo "Backend deploy attempt ${attempt}/3"
            cleanup_stale_release_machines

            if [[ "${attempt}" -eq 1 ]]; then
              depot="true"
            else
              depot="false"
            fi

            if deploy_backend "${depot}"; then
              echo "Backend deploy succeeded on attempt ${attempt}"
              exit 0
            fi

            if [[ "${attempt}" -lt 3 ]]; then
              sleep_seconds=$((attempt * 45))
              echo "Backend deploy attempt ${attempt} failed. Retrying in ${sleep_seconds}s..."
              sleep "${sleep_seconds}"
            fi
          done

          echo "Backend deploy failed after 3 attempts."
          exit 1

      - name: Deploy Frontend to Staging
        working-directory: web
        run: |
          set -euo pipefail

          deploy_frontend() {
            local depot_flag="$1"
            flyctl deploy \
              --config fly.staging.toml \
              --remote-only \
              --wait-timeout 10m \
              --depot="${depot_flag}"
          }

          for attempt in 1 2 3; do
            echo "Frontend deploy attempt ${attempt}/3"
            if [[ "${attempt}" -eq 1 ]]; then
              depot="true"
            else
              depot="false"
            fi

            if deploy_frontend "${depot}"; then
              echo "Frontend deploy succeeded on attempt ${attempt}"
              exit 0
            fi

            if [[ "${attempt}" -lt 3 ]]; then
              echo "Frontend deploy attempt ${attempt} failed. Retrying in 30s..."
              sleep 30
            fi
          done

          echo "Frontend deploy failed after 3 attempts."
          exit 1

      - name: Verify Backend Deployment
        run: |
          sleep 10
          curl -f https://ace-platform-staging.fly.dev/health || exit 1

      - name: Verify Frontend Deployment
        run: |
          curl -f https://ace-platform-web-staging.fly.dev/ || exit 1
