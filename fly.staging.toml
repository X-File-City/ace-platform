# Fly.io Configuration for ACE Platform - STAGING
# Documentation: https://fly.io/docs/reference/configuration/
#
# Staging Setup:
#   1. Create staging app: fly apps create ace-platform-staging
#   2. Create staging Postgres: fly postgres create --name ace-platform-staging-db
#   3. Attach Postgres: fly postgres attach ace-platform-staging-db -a ace-platform-staging
#   4. Create staging Redis: fly redis create --name ace-platform-staging-redis
#   5. Set secrets: fly secrets set -a ace-platform-staging OPENAI_API_KEY=sk-... JWT_SECRET_KEY=...
#   6. Deploy: fly deploy --config fly.staging.toml
#
# Differences from production:
#   - Smaller memory allocations
#   - Single worker with lower concurrency

app = "ace-platform-staging"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = 30

# =============================================================================
# Build Configuration
# =============================================================================
[build]
  dockerfile = "Dockerfile"
  target = "production"

# =============================================================================
# Process Groups
# =============================================================================
[processes]
  api = "uvicorn ace_platform.api.main:app --host 0.0.0.0 --port 8000 --workers 1"
  mcp = "python -m ace_platform.mcp.server http"
  worker = "celery -A ace_platform.workers.celery_app worker --loglevel=info --concurrency=1"
  beat = "celery -A ace_platform.workers.celery_app beat --loglevel=info"

# =============================================================================
# Environment Variables
# =============================================================================
[env]
  ENVIRONMENT = "staging"
  DEBUG = "true"
  API_HOST = "0.0.0.0"
  API_PORT = "8000"
  SENTRY_TRACES_SAMPLE_RATE = "0.1"
  SENTRY_PROFILES_SAMPLE_RATE = "0.05"
  SENTRY_TRANSPORT_QUEUE_SIZE = "100"
  SENTRY_TRACES_SAMPLE_RATE_API = "0.1"
  SENTRY_PROFILES_SAMPLE_RATE_API = "0.05"
  SENTRY_TRANSPORT_QUEUE_SIZE_API = "100"
  SENTRY_TRACES_SAMPLE_RATE_MCP = "0.05"
  SENTRY_PROFILES_SAMPLE_RATE_MCP = "0.0"
  SENTRY_TRANSPORT_QUEUE_SIZE_MCP = "100"
  SENTRY_TRACES_SAMPLE_RATE_WORKER = "0.05"
  SENTRY_PROFILES_SAMPLE_RATE_WORKER = "0.0"
  SENTRY_TRANSPORT_QUEUE_SIZE_WORKER = "100"
  SENTRY_TRACES_SAMPLE_RATE_BEAT = "0.0"
  SENTRY_PROFILES_SAMPLE_RATE_BEAT = "0.0"
  SENTRY_TRANSPORT_QUEUE_SIZE_BEAT = "50"
  # DATABASE_URL is automatically set by `fly postgres attach`
  # REDIS_URL is automatically set by `fly redis create`

# =============================================================================
# HTTP Service (API)
# =============================================================================
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["api"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 150

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/health"

# =============================================================================
# Deploy Configuration
# =============================================================================
[deploy]
  release_command = "alembic upgrade head"
  strategy = "rolling"

# =============================================================================
# Machine Configuration (smaller than production)
# =============================================================================
# API server
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["api"]

# MCP server
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  processes = ["mcp"]

# Worker (still needs memory for LLM processing)
[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  processes = ["worker"]

# Beat scheduler
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["beat"]
