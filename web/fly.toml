app = 'ace-platform-web'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"
  [build.args]
    VITE_API_URL = "https://aceagent.io"
    VITE_DOCS_URL = "https://docs.aceagent.io/docs"
    VITE_SENTRY_DSN = ""
    VITE_SENTRY_RELEASE = ""
    VITE_SENTRY_ENVIRONMENT = "production"

[env]
  CSP_API_URL = "https://aceagent.io"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
